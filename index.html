<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHM Music Player</title>
</head>
<link rel="stylesheet" href="style.css">
<body>


    <audio src="" id="audio"></audio>

    <div class="music_player">
        <h1 class="music_name">song one</h1>
        <p class="artist_name">artist</p>

        <div class="disk play"></div>

        <div class="song_slider">
            <input type="range" value="0" class="seek_bar">
            <span class="current_time">00:00</span>
            <span class="song_duration">00:00</span>
        </div>

        <div class="controls">
            <button class="btn backward-btn"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
  <path stroke-linecap="round" stroke-linejoin="round" d="M21 16.811c0 .864-.933 1.406-1.683.977l-7.108-4.061a1.125 1.125 0 0 1 0-1.954l7.108-4.061A1.125 1.125 0 0 1 21 8.689v8.122ZM11.25 16.811c0 .864-.933 1.406-1.683.977l-7.108-4.061a1.125 1.125 0 0 1 0-1.954l7.108-4.061a1.125 1.125 0 0 1 1.683.977v8.122Z" />
</svg>
</button>
            <button class="play_btn pause">
                <span></span>
                <span></span>
            </button>
            <button class="btn forward-btn"> <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
  <path stroke-linecap="round" stroke-linejoin="round" d="M3 8.689c0-.864.933-1.406 1.683-.977l7.108 4.061a1.125 1.125 0 0 1 0 1.954l-7.108 4.061A1.125 1.125 0 0 1 3 16.811V8.69ZM12.75 8.689c0-.864.933-1.406 1.683-.977l7.108 4.061a1.125 1.125 0 0 1 0 1.954l-7.108 4.061a1.125 1.125 0 0 1-1.683-.977V8.69Z" />
</svg>
  </button>
        </div>
    </div>
    <script src="data.js"></script>
    <script src="app.js"></script>
    
</body>
</html>
